<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Siswa - Sistem Informasi Ekstrakurikuler</title>
    <style>
        nav {
            background-color: #333;
            color: white;
            padding: 10px 0;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .nav-logo {
            font-size: 1.2em;
            font-weight: bold;
        }
        .nav-links {
            display: flex;
            gap: 20px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }
        .nav-links a:hover {
            background-color: #555;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .welcome {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .categories {
            margin-bottom: 30px;
        }
        .category-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 15px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 5px;
        }
        .extracurriculars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .extracurricular-card {
            background-color: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .extracurricular-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .extracurricular-logo {
            font-size: 2em;
            text-align: center;
            margin-bottom: 10px;
        }
        .extracurricular-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin: 0 0 10px 0;
            text-align: center;
        }
        .detail-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 0.9em;
        }
        .detail-btn:hover {
            background-color: #45a049;
        }
        .navigation {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .nav-btn {
            background-color: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            margin: 0 10px;
        }
        .nav-btn:hover {
            background-color: #1976D2;
        }
    </style>
</head>
<body>
    <header>
        <h1>Dashboard Siswa</h1>
    </header>
    <div class="container">
        <div class="welcome">
            <h2>Selamat datang, Siswa!</h2>
            <p>Jelajahi berbagai ekstrakurikuler yang tersedia di sekolah kami.</p>
        </div>

        <div class="categories">
            <h3 class="category-title">Organisasi</h3>
            <div class="extracurriculars-grid">
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">🏛️</div>
                    <h4 class="extracurricular-name">OSIS</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">👥</div>
                    <h4 class="extracurricular-name">MPK</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
            </div>
        </div>

        <div class="categories">
            <h3 class="category-title">Seni</h3>
            <div class="extracurriculars-grid">
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">🎨</div>
                    <h4 class="extracurricular-name">Tari Tradisional</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">🎵</div>
                    <h4 class="extracurricular-name">Paduan Suara</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">🎭</div>
                    <h4 class="extracurricular-name">Teater</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
            </div>
        </div>

        <div class="categories">
            <h3 class="category-title">Olahraga</h3>
            <div class="extracurriculars-grid">
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">⚽</div>
                    <h4 class="extracurricular-name">Sepakbola</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">🏀</div>
                    <h4 class="extracurricular-name">Basket</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
                <div class="extracurricular-card">
                    <div class="extracurricular-logo">🏐</div>
                    <h4 class="extracurricular-name">Voli</h4>
                    <button class="detail-btn">Lihat Detail</button>
                </div>
            </div>
        </div>

        <div class="navigation">
            <a href="profile.html"><button class="nav-btn">Ke Profil Saya</button></a>
        </div>
    </div>
</body>
</html>
