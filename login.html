<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem Informasi Ekstrakurikuler</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 1em;
        }
        .role-selection {
            margin-bottom: 30px;
        }
        .role-selection label {
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
            display: block;
        }
        .role-option {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .role-option input[type="radio"] {
            margin-right: 10px;
            transform: scale(1.2);
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .login-btn:hover {
            background: linear-gradient(135deg, #2980b9, #21618c);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(52, 152, 219, 0.3);
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-container">
            <div class="nav-logo">SI-Eskul</div>
            <div class="nav-links">
                <a href="index.html">Beranda</a>
                <a href="login.html">Login</a>
                <a href="pages/notifications.html">Notifikasi</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="login-container">
            <h2>Login Sistem</h2>
            <form>
                <div class="form-group">
                    <label for="nisn">NISN:</label>
                    <input type="text" id="nisn" name="nisn" required>
                </div>
                <div class="form-group">
                    <label for="nama">Nama:</label>
                    <input type="text" id="nama" name="nama" required>
                </div>
                <div class="form-group">
                    <label for="email">Email (Opsional):</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="role-selection">
                    <label>Login sebagai:</label>
                    <div class="role-option">
                        <input type="radio" id="siswa" name="role" value="siswa" checked>
                        <label for="siswa">Siswa</label>
                    </div>
                    <div class="role-option">
                        <input type="radio" id="pengurus" name="role" value="pengurus">
                        <label for="pengurus">Pengurus</label>
                    </div>
                </div>
                <button type="submit" class="login-btn">Masuk</button>
            </form>
        </div>
    </div>
</body>
</html>
